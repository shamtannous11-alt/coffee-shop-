<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Our Coffee Shop</title>
    <style>
        /* General body style */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #fceabb, #f8b500, #d35400); /* warm coffee gradient */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            background-size: 600% 600%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* Main container */
        .home-container {
            background-color: rgba(50, 30, 10, 0.7); /* dark coffee overlay */
            padding: 50px 80px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .home-container h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
        }

        .home-container p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* Button style */
        .home-container a {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 12px;
            background: #f39c12;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .home-container a:hover {
            background: #e67e22;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h1>☕ Welcome to Our Coffee Shop ☕</h1>
        <p>Discover the best hot and cold drinks, and delicious cakes!</p>
        <!-- Menu button linking to work.html -->
        <a href="work.html">Menu</a>
    </div>
</body>
</html>
