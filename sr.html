<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cold Drinks Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #8e44ad, #3498db, #1abc9c);
      background-size: 600% 600%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .menu-container {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 40px 60px;
      border-radius: 20px;
      color: white;
      width: 700px;
      max-width: 95%;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 2.5rem;
    }

    .drink-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .drink-list li {
      font-size: 1.2rem;
      padding: 12px 18px;
      margin: 10px 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .drink-list li:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.03);
    }

    .preview-box {
      margin-top: 25px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.1);
      text-align: center;
    }

    .preview-title {
      font-size: 1.1rem;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .preview-box img {
      width: 100%;
      max-width: 300px;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
      margin: 0 auto;
    }

    #imgMessage {
      margin-top: 10px;
      font-size: 14px;
      color: #fff3cd;
    }

    .back-btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      font-size: 1.2rem;
      padding: 12px 20px;
      margin-top: 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <h1>❄️ Cold Drinks Menu ❄️</h1>

    <ul class="drink-list">
      <li onclick="showItem('Cola', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVMW0QvwVYPh4Vbwn6_1d3-8wF8NlaNS3UnA&s')">
        <span>🥤 Cola</span><span>5$</span>
      </li>
      <li onclick="showItem('Orange Juice', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_k3dmXxGhAIYtpo1VDWy8SJi30wQqJ5J9Ig&s')">
        <span>🧃 Orange Juice</span><span>5$</span>
      </li>
      <li onclick="showItem('Lemonade', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTZJ4XzJGL3e-4pZs1iWySbxWmlgstTvTum2w&s')">
        <span>🍹 Lemonade</span><span>6$</span>
      </li>
      <li onclick="showItem('Iced Milkshake', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOAQA0fpkRk3XO5ec_pZBN6UWG5S8VnGfPjQ&s')">
        <span>🥛 Iced Milkshake</span><span>12$</span>
      </li>
      <li onclick="showItem('Iced Tea', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTfL-pK1C8irCWhPCjKUYof_JYvOoi5JxoL2A&s')">
        <span>🫖 Iced Tea</span><span>13$</span>
      </li>
    </ul>

    <div class="preview-box">
      <div class="preview-title" id="previewTitle">Click any drink to see its image</div>
      <img id="previewImage" src="" alt="Drink image">
      <div id="imgMessage"></div>
    </div>

    <a href="work.html" class="back-btn">🏠 Back to Hub</a>
  </div>

  <script>
    function showItem(name, imagePath) {
      const title = document.getElementById("previewTitle");
      const img = document.getElementById("previewImage");
      const msg = document.getElementById("imgMessage");

      title.innerText = name;
      msg.innerText = "";

      img.onload = function () {
        img.style.display = "block";
        msg.innerText = "";
      };

      img.onerror = function () {
        img.style.display = "none";
        msg.innerText = "Image not found. Put this file here: " + imagePath;
      };

      img.src = imagePath;
    }
  </script>
</body>
</html>
