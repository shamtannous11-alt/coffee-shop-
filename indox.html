<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hot Drinks Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e74c3c, #f39c12, #c0392b);
      background-size: 600% 600%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .menu-container {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 40px 60px;
      border-radius: 20px;
      color: white;
      width: 700px;
      max-width: 95%;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 2.5rem;
    }

    .drink-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .drink-list li {
      font-size: 1.2rem;
      padding: 12px 18px;
      margin: 10px 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .drink-list li:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.03);
    }

    .preview-box {
      margin-top: 25px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.1);
      text-align: center;
    }

    .preview-title {
      font-size: 1.1rem;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .preview-box img {
      width: 100%;
      max-width: 300px;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
      margin: 0 auto;
    }

    #imgMessage {
      margin-top: 10px;
      font-size: 14px;
      color: #fff3cd;
    }

    .back-btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      font-size: 1.2rem;
      padding: 12px 20px;
      margin-top: 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <h1>🔥 Hot Drinks Menu 🔥</h1>

    <ul class="drink-list">
      <li onclick="showItem('Espresso', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSbeuOQDfnyYHHX61LrO1iF6fAiBeBDAdy2Dw&s')">
        <span>☕ Espresso</span><span>30ml</span>
      </li>
      <li onclick="showItem('Americano', 'https://cdn.sanity.io/images/t3ffnogl/production/73e308292a5e05e2fca2fc16018308c6cf6dc373-1500x1000.jpg?w=1000&fm=webp')">
        <span>☕ Americano</span><span>150ml</span>
      </li>
      <li onclick="showItem('Cappuccino', 'https://www.gourmetkava.cz/modules/ph_simpleblog/featured/75.jpg')">
        <span>☕ Cappuccino</span><span>200ml</span>
      </li>
      <li onclick="showItem('Latte', 'https://cornercoffeestore.com/wp-content/uploads/2020/01/how-to-make-a-latte-at-home.jpg')">
        <span>☕ Latte</span><span>250ml</span>
      </li>
      <li onclick="showItem('Mocha', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRluoJW9LDfnblCVQNq0gHEhpg68s636YwrRQ&s')">
        <span>☕ Mocha</span><span>250ml</span>
      </li>
      <li onclick="showItem('Hot Chocolate', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRma6rIZDCW2FrLrhj-CbYxFK57kk6esBpbHA&s')">
        <span>🥛 Hot Chocolate</span><span>200ml</span>
      </li>
      <li onclick="showItem('Green Tea', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDxr1ShIiPkZgT0TbHu_UEnftNgsGAkik8iQ&s')">
        <span>🫖 Green Tea</span><span>200ml</span>
      </li>
      <li onclick="showItem('Herbal Tea', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTSYw7FvangGOFsDGIHsTuqYsGBf2vaVOeBdA&s')">
        <span>🫖 Herbal Tea</span><span>200ml</span>
      </li>
      <li onclick="showItem('Chai Latte', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjc4LaFf5GFgm_bYSlyl4kxZt9rY8HfvphIA&s')">
        <span>🥤 Chai Latte</span><span>250ml</span>
      </li>
      <li onclick="showItem('Flat White', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3fYZww0V9LYvXKR8ZfQl5tioZAtirxpSz2A&s')">
        <span>☕ Flat White</span><span>200ml</span>
      </li>
      <li onclick="showItem('Macchiato', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3ZnDdNPaiz73bvkvZqYw2AtvZAYNCcSKwSQ&s')">
        <span>☕ Macchiato</span><span>50ml</span>
      </li>
    </ul>

    <div class="preview-box">
      <div class="preview-title" id="previewTitle">Click any drink to see its image</div>
      <img id="previewImage" src="" alt="Hot drink image">
      <div id="imgMessage"></div>
    </div>

    <a href="work.html" class="back-btn">🏠 Back to Hub</a>
  </div>

  <script>
    function showItem(name, imagePath) {
      const title = document.getElementById("previewTitle");
      const img = document.getElementById("previewImage");
      const msg = document.getElementById("imgMessage");

      title.innerText = name;
      msg.innerText = "";

      img.onload = function () {
        img.style.display = "block";
        msg.innerText = "";
      };

      img.onerror = function () {
        img.style.display = "none";
        msg.innerText = "Image not found. Put this file here: " + imagePath;
      };

      img.src = imagePath;
    }
  </script>
</body>
</html>
