<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fceabb, #f8b500, #d35400);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            background-size: 600% 600%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-container {
            background-color: rgba(50, 30, 10, 0.7);
            padding: 50px 80px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }

        .menu-container h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
        }

        .menu-container a {
            display: block;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 12px;
            background: #f39c12;
            color: #fff;
            text-decoration: none;
            margin: 15px 0;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .menu-container a:hover {
            background: #e67e22;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>📋 Our Menu 📋</h1>

        <a href="indox.html">☕ Hot Drinks</a>
        <a href="sr.html">🥤 Cold Drinks</a>
        <a href="sm.html">🍰 Desserts & Cakes</a>
        <a href="cashier.html">🧾 Cashir</a>
        <a href="sham.html">🏠 Back to Home</a>
    </div>
</body>
</html>
